<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misión Marista PRO</title>
    <style>
        :root {
            --p: #004a99;
            --ex: #28a745;
            --er: #d9534f;
        }

        body {
            margin: 0;
            /* Fondo con patrón matemático sutil */
            background: linear-gradient(-45deg, #e0eafc, #cfdef3, #8eb9eb, #447ab4);
            background-size: 400% 400%;
            animation: gradientBlue 12s ease infinite;
            min-height: 100vh;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;

        }
        @keyframes gradientBlue {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

        /* Símbolos decorativos */
 /* Símbolos de alto impacto y abundantes */
.math-bg {
    position: absolute;
    color: rgba(0, 74, 153, 0.18); /* Un poco más oscuro para que se noten */
    font-weight: 900;
    z-index: -1;
    user-select: none;
    pointer-events: none;
    animation: float-pro 10s ease-in-out infinite;
}

.rev {
    animation: float-reverse 12s ease-in-out infinite !important;
}

@keyframes float-pro {
    0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
    50% { transform: translateY(-40px) rotate(20deg) scale(1.1); }
}

@keyframes float-reverse {
    0%, 100% { transform: translateY(0) rotate(0deg) scale(1.1); }
    50% { transform: translateY(40px) rotate(-20deg) scale(1); }
}

        .card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            text-align: center;
            width: 100%; max-width: 480px;
            position: relative;
            animation: fadeIn 0.5s ease;
        }

        h1 { color: var(--p); font-size: 2.2rem; margin-bottom: 10px; font-weight: 800; }

        .screen { display: none; }
        .active { display: block; }

        button {
            padding: 14px 28px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
            margin: 8px;
            background: var(--p);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 74, 153, 0.2);
        }

        button:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0, 74, 153, 0.3); }
        button:disabled { background: #ccc; cursor: not-allowed; }

        input {
            width: 85%; padding: 16px; border-radius: 16px; border: 2px solid #ddd;
            font-size: 1.5rem; margin: 15px 0; text-align: center;
        }
        .rocket-icon {
    font-size: 4.5rem;
    margin-bottom: 15px;
    display: inline-block;
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
    animation: float 3s ease-in-out infinite;
}
.texto-llamativo {
    color: var(--p);
    font-weight: 700;
    font-size: 1.1rem;
    text-shadow: 0 0 10px rgba(0, 74, 153, 0.1);
    margin-top: 20px;
}

        /* Estilo de la pista oculta */
        .pista {
            display: none; /* Oculta por defecto */
            background: #fff8e1; border-radius: 15px; padding: 15px;
            margin-bottom: 20px; color: #856404; border: 1px dashed #ffeeba;
            animation: slideDown 0.3s ease;
        }

        #tema-tag {
            background: var(--p); color: white; padding: 5px 15px;
            border-radius: 50px; font-size: 0.8rem; font-weight: bold;
            display: inline-block; margin-bottom: 10px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="math-bg" style="top: 10%; left: 5%;">π</div>
<div class="math-bg" style="bottom: 15%; right: 10%;">√x</div>
<div class="math-bg" style="top: 2%; left: 2%; font-size: 10rem;">∑</div>
<div class="math-bg rev" style="top: 5%; right: 5%; font-size: 8rem;">π</div>
<div class="math-bg" style="top: 40%; left: 5%; font-size: 9rem;">√</div>
<div class="math-bg rev" style="bottom: 5%; left: 5%; font-size: 7rem;">∞</div>
<div class="math-bg" style="bottom: 2%; right: 2%; font-size: 11rem;">∫</div>
<div class="math-bg rev" style="top: 20%; left: 25%; font-size: 5rem;">Δ</div>
<div class="math-bg" style="bottom: 15%; right: 30%; font-size: 6rem;">ƒ(x)</div>
<div class="math-bg rev" style="top: 45%; right: 5%; font-size: 7rem;">α</div>
<div class="math-bg" style="top: 10%; left: 45%; font-size: 4rem;">%</div>
<div class="math-bg rev" style="bottom: 35%; left: 15%; font-size: 5rem;">θ</div>
<div class="math-bg" style="top: 60%; left: 35%; font-size: 8rem;">Ω</div>
<div class="math-bg rev" style="top: 30%; right: 20%; font-size: 6rem;">λ</div>
<div class="math-bg" style="bottom: 10%; left: 40%; font-size: 5rem;">β</div>
<div class="math-bg rev" style="top: 75%; right: 15%; font-size: 9rem;">≠</div>
<div class="math-bg" style="top: 80%; left: 20%; font-size: 4rem;">±</div>
<div class="math-bg rev" style="top: 50%; left: 50%; font-size: 3rem;">≈</div>
<div class="math-bg" style="top: 15%; right: 40%; font-size: 5rem;">√n</div>
<div class="math-bg rev" style="bottom: 25%; right: 45%; font-size: 6rem;">μ</div>
<div class="math-bg" style="top: 65%; right: 35%; font-size: 4rem;">log</div>
<div class="math-bg rev" style="top: 5%; left: 15%; font-size: 3rem;">sin</div>

<div id="menu" class="screen active">
    <div class="card">
       <div class="rocket-icon">🚀</div>
        <h1>Inicia el Desafio</h1>
        <p>Selecciona un nivel para comenzar:</p>
        <button onclick="iniciar(8)">8vo EGB</button>
        <button id="btn9" onclick="iniciar(9)" disabled>9no EGB 🔒</button>
        <button id="btn10" onclick="iniciar(10)" disabled>10mo EGB 🔒</button>
        <p class="texto-llamativo">¿Estás listo para demostrar lo que sabes? 🫡</p>
    </div>
</div>

<div id="juego" class="screen">
    <div class="card">
        <div id="tema-tag">MATEMÁTICAS</div>
        
        <div id="pista-box" class="pista"></div>

        <p id="pregunta-box" style="font-size: 1.3rem; font-weight: bold;"></p>
        
        <input id="respuesta-txt" type="text" placeholder="Tu respuesta..." autocomplete="off">
        <br>
        <button onclick="comprobar()">Abrir Puerta</button>
        
        <p id="msg" style="min-height: 24px; font-weight: bold;"></p>
        <p style="color: #888; font-size: 0.8rem;">Puerta <span id="puerta-cont">1</span> de 5</p>
    </div>
</div>

<script>
    // TU LÓGICA ORIGINAL SIN CAMBIOS
    let cursoActual = 8;
    let puerta = 0;
    let actual = {};

    function iniciar(n) {
        cursoActual = n;
        puerta = 0;
        document.getElementById('menu').classList.remove('active');
        document.getElementById('juego').classList.add('active');
        generarMision();
    }

    function generarMision() {
        let t, q, r, p;
        let seed = Math.floor(Math.random() * 6);

        if (cursoActual == 8) {
            if (seed == 0) {
                let a = Math.floor(Math.random() * 40) - 20;
                let b = Math.floor(Math.random() * 40) - 20;
                t = "Números Enteros"; q = `Resuelve: (${a}) + (${b})`; r = a + b;
                p = "Signos iguales se suman, distintos se restan.";
            } else if (seed == 1) {
                let d = Math.floor(Math.random() * 5) + 2;
                let n1 = Math.floor(Math.random() * 6) + 1;
                let n2 = Math.floor(Math.random() * 6) + 1;
                t = "Fracciones Homogéneas"; q = `Calcula ${n1}/${d} + ${n2}/${d} (Responde en decimal)`; r = (n1 + n2) / d;
                p = "Suma solo los numeradores.";
            } else if (seed == 2) {
                let v = Math.floor(Math.random() * 100) - 50;
                t = "Valor Absoluto"; q = `¿Cuál es el |${v}|?`; r = Math.abs(v);
                p = "La distancia al cero siempre es positiva.";
            } else if (seed == 3) {
                let b = Math.floor(Math.random() * 5) + 2;
                t = "Álgebra: Potencias"; q = `¿Cuánto es ${b} elevado al cubo (³)?`; r = Math.pow(b, 3);
                p = "Multiplica la base por sí misma 3 veces.";
            } else {
                t = "Geometría"; q = "Si un triángulo tiene sus 3 lados iguales, ¿cuántos lados desiguales tiene?"; r = 0;
                p = "El triángulo Equilátero tiene todos los lados iguales.";
            }
        } 
        else if (cursoActual == 9) {
            if (seed == 0) {
                let x = 2;
                t = "Operaciones con Polinomios"; q = `Si P(x) = 3x + 4, ¿cuánto es P(${x})?`; r = 3 * x + 4;
                p = "Sustituye la x por el número indicado.";
            } else if (seed == 1) {
                let nA = Math.floor(Math.random() * 4) + 2;
                let nB = Math.floor(Math.random() * 3) + 2;
                t = "Producto Cartesiano"; q = `A tiene ${nA} elementos y B tiene ${nB}. ¿Cuántos pares tiene A x B?`; r = nA * nB;
                p = "Multiplica las cantidades.";
            } else if (seed == 2) {
                t = "Teorema de Pitágoras"; q = "Catetos de 6 y 8. ¿Cuánto mide la hipotenusa?"; r = 10;
                p = "Usa a² + b² = c².";
            } else {
                t = "Números Reales"; q = "¿A qué número equivale 2.1 x 10²?"; r = 210;
                p = "Mueve la coma dos espacios a la derecha.";
            }
        } 
        else if (cursoActual == 10) {
            if (seed == 0) {
                t = "Funciones Trigonométricas"; q = "En un triángulo, Cateto Opuesto = 10, Hipotenusa = 20. ¿Seno?"; r = 0.5;
                p = "Seno = Opuesto / Hipotenusa.";
            } else if (seed == 1) {
                let m = Math.floor(Math.random() * 10) + 2;
                t = "Funciones"; q = `¿Cuál es la pendiente en f(x) = ${m}x - 5?`; r = m;
                p = "La pendiente acompaña a la x.";
            } else if (seed == 2) {
                t = "Estadística"; q = "Media aritmética de: 10, 20, 30"; r = 20;
                p = "Suma los datos y divide para 3.";
            } else {
                t = "Geometría y Medida"; q = "Volumen de un cubo cuyo lado mide 4"; r = 64;
                p = "V = lado * lado * lado.";
            }
        }

        actual = { t, q, r, p };
        actualizarUI();
    }

    function actualizarUI() {
        document.getElementById('tema-tag').innerText = actual.t;
        document.getElementById('pregunta-box').innerText = actual.q;
        document.getElementById('puerta-cont').innerText = puerta + 1;
        document.getElementById('respuesta-txt').value = "";
        document.getElementById('msg').innerText = "";
        
        // RESET: Ocultar la pista al generar nueva pregunta
        document.getElementById('pista-box').style.display = "none";
        document.getElementById('pista-box').innerText = "";
        
        document.getElementById('respuesta-txt').focus();
    }

    function comprobar() {
        let input = document.getElementById('respuesta-txt').value.replace(',', '.');
        let userR = parseFloat(input);

        if (!isNaN(userR) && Math.abs(userR - actual.r) < 0.01) {
            puerta++;
            if (puerta < 5) {
                document.getElementById('msg').innerText = "✅ ¡Correcto! Avanzas.";
                document.getElementById('msg').style.color = "var(--ex)";
                setTimeout(generarMision, 1000);
            } else {
                completar();
            }
        } else {
            // ERROR: Mostrar mensaje y ACTIVAR PISTA
            document.getElementById('msg').innerText = "❌ Incorrecto";
            document.getElementById('msg').style.color = "var(--er)";
            
            // Aquí se activa la pista solo si se equivoca
            let box = document.getElementById('pista-box');
            box.innerText = "💡 Ayuda: " + actual.p;
            box.style.display = "block";
        }
    }

    function completar() {
        alert("🎉 ¡Misión cumplida! Has dominado " + cursoActual + "vo.");
        if (cursoActual == 8) document.getElementById('btn9').disabled = false;
        if (cursoActual == 9) document.getElementById('btn10').disabled = false;
        document.getElementById('juego').classList.remove('active');
        document.getElementById('menu').classList.add('active');
    }

    document.getElementById('respuesta-txt').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') comprobar();
    });
</script>

</body>
</html>
